---
layout: default
---

{% include home-header.html %}

<div class="posts" id="posts-container">
  {% for post in site.posts %}
  <section class="post-entry" data-post-index="{{ forloop.index0 }}">
    <h2 class="post-title">
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </h2>

    <div class="post-meta">
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date_to_string }}</time>
    </div>

    <p>{{ post.excerpt | strip_html }}</p>
  </section>
  {% endfor %}
</div>

<div class="pagination" id="pagination-container">
</div>

<script>
  (function() {
    const postsPerPage = 10;
    const posts = document.querySelectorAll('.post-entry');
    const totalPosts = posts.length;
    const totalPages = Math.ceil(totalPosts / postsPerPage);
    let currentPage = 1;

    function showPage(page) {
      const start = (page - 1) * postsPerPage;
      const end = start + postsPerPage;

      posts.forEach((post, index) => {
        if (index >= start && index < end) {
          post.style.display = 'block';
        } else {
          post.style.display = 'none';
        }
      });

      updatePagination(page);
    }

    function updatePagination(currentPage) {
      const paginationContainer = document.getElementById('pagination-container');
      let paginationHTML = '';

      // 上一页
      if (currentPage > 1) {
        paginationHTML += `<a class="pagination-item newer" href="#" onclick="changePage(${currentPage - 1}); return false;">第${currentPage}页</a>`; 
      } else {
        paginationHTML += `<span class="pagination-item newer">第1页</span>`;
      }

      // 下一页
      if (currentPage < totalPages) {
        paginationHTML += `<a class="pagination-item older" href="#" onclick="changePage(${currentPage + 1}); return false;">还有${totalPages - currentPage}页</a>`;
      } else {
        paginationHTML += `<span class="pagination-item older">只有${totalPages}页</span>`;
      }
      // 页码
      // paginationHTML += `<span class="pagination-info">Page ${currentPage} of ${totalPages}</span>`;

      paginationContainer.innerHTML = paginationHTML;
    }

    window.changePage = function(page) {
      currentPage = page;
      showPage(page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // 初始化显示第一页
    showPage(1);
  })();
</script>
