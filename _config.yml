# Setup
title: 毛艳飞
description: 不知名计算机领域从业人员|未认证高级软件工程师|PMP项目管理专业资格人士却还在一线搬砖的新生代农民工
url: https://maoyanfei.github.io
avatar: /avatar.jpeg
paginate: 5
permalink: pretty
cover_image: /bg.jpeg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Pagination settings
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title_suffix: ' - Page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: maoyanfei
  card: summary
logo: logo.png
social:
  name: maoyanfei
  links:
    - https://maoyanfei.github.io/
google_site_verification: xxxxx
lang: zh-CN

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Mao Yanfei
  url: https://maoyanfei.github.io/
  email: 415850136@qq.com
